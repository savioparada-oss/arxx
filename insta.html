<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Instagram ARXX</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      background:#111;
      color:white;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
      text-align:center;
      padding:20px;
    }

    .container{
      max-width:650px;
      background:#1d1d1d;
      padding:50px;
      border-radius:20px;
      box-shadow:0 10px 30px rgba(0,0,0,0.4);
    }

    h1{
      font-size:55px;
      color:#f7b500;
      margin-bottom:20px;
    }

    p{
      font-size:20px;
      line-height:1.8;
      margin-bottom:35px;
      color:#ddd;
    }

    .btn{
      display:inline-block;
      padding:16px 35px;
      background:#f7b500;
      color:#000;
      text-decoration:none;
      border-radius:10px;
      font-weight:bold;
      transition:0.3s;
      font-size:18px;
    }

    .btn:hover{
      transform:scale(1.05);
    }

    .voltar{
      margin-top:25px;
      display:block;
      color:#aaa;
      text-decoration:none;
      font-size:16px;
    }

    .voltar:hover{
      color:white;
    }

  </style>

</head>

<body>

  <div class="container">

    <h1>
      Instagram Carlos
    </h1>

    <p>
      Clique no botão abaixo para acessar o Instagram do Carlos
      e acompanhar os projetos, obras e resultados realizados pela ARXX.
    </p>

    <a class="btn" href="https://instagram.com/carlos" target="_blank">
      Abrir Instagram
    </a>

    <a class="voltar" href="index.html">
      ← Voltar ao site
    </a>

  </div>

</body>
</html>
